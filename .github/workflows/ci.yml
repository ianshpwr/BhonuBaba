name: Continuous Integration and Deployment

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]

env:
  PROJECT_NAME: bhonubaba
  AWS_REGION: ${{ secrets.AWS_REGION }}
  TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
  TF_VAR_project_name: bhonubaba

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd="mongosh --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json

      - name: Install backend dependencies
        working-directory: server
        run: npm ci

      - name: Install frontend dependencies
        working-directory: client
        run: npm ci

      - name: Lint backend
        working-directory: server
        run: npm run lint

      - name: Lint frontend
        working-directory: client
        run: npm run lint

      - name: Run backend tests with reports
        working-directory: server
        env:
          JWT_SECRET: test-secret
          TEST_MONGO_URI: mongodb://127.0.0.1:${{ job.services.mongo.ports['27017'] }}/bhonubaba_test
        run: npm run test:report

      - name: Run frontend tests with reports
        working-directory: client
        run: npm run test:report

      - name: Build backend
        working-directory: server
        run: npm run build

      - name: Build frontend
        working-directory: client
        env:
          NEXT_PUBLIC_API_URL: http://localhost:5000/api
        run: npm run build

      - name: Upload backend test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: |
            server/reports
          if-no-files-found: error

      - name: Upload frontend test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-reports
          path: |
            client/reports
          if-no-files-found: error

  terraform:
    if: github.event_name == 'push'
    needs: quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Bootstrap Terraform backend
        shell: bash
        run: |
          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          TF_STATE_BUCKET="${PROJECT_NAME}-${ACCOUNT_ID}-${AWS_REGION}-tfstate"
          TF_LOCK_TABLE="${PROJECT_NAME}-terraform-locks"

          if ! aws s3api head-bucket --bucket "$TF_STATE_BUCKET" 2>/dev/null; then
            if [ "$AWS_REGION" = "us-east-1" ]; then
              aws s3api create-bucket --bucket "$TF_STATE_BUCKET"
            else
              aws s3api create-bucket \
                --bucket "$TF_STATE_BUCKET" \
                --create-bucket-configuration "LocationConstraint=${AWS_REGION}"
            fi
          fi

          aws s3api put-bucket-versioning \
            --bucket "$TF_STATE_BUCKET" \
            --versioning-configuration Status=Enabled

          aws s3api put-bucket-encryption \
            --bucket "$TF_STATE_BUCKET" \
            --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'

          aws s3api put-public-access-block \
            --bucket "$TF_STATE_BUCKET" \
            --public-access-block-configuration BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true

          if ! aws dynamodb describe-table --table-name "$TF_LOCK_TABLE" >/dev/null 2>&1; then
            aws dynamodb create-table \
              --table-name "$TF_LOCK_TABLE" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST
          fi

          echo "TF_STATE_BUCKET=$TF_STATE_BUCKET" >> "$GITHUB_ENV"
          echo "TF_LOCK_TABLE=$TF_LOCK_TABLE" >> "$GITHUB_ENV"

      - name: Terraform init
        working-directory: infra/terraform
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${PROJECT_NAME}/production.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="dynamodb_table=${TF_LOCK_TABLE}" \
            -backend-config="encrypt=true"

      - name: Terraform validate
        working-directory: infra/terraform
        run: terraform validate

      - name: Terraform plan
        working-directory: infra/terraform
        run: terraform plan -input=false -out=tfplan

      - name: Terraform apply
        working-directory: infra/terraform
        run: terraform apply -input=false -auto-approve tfplan

  build_and_push:
    if: github.event_name == 'push'
    needs: terraform
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Bootstrap Terraform backend
        shell: bash
        run: |
          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          echo "TF_STATE_BUCKET=${PROJECT_NAME}-${ACCOUNT_ID}-${AWS_REGION}-tfstate" >> "$GITHUB_ENV"
          echo "TF_LOCK_TABLE=${PROJECT_NAME}-terraform-locks" >> "$GITHUB_ENV"

      - name: Terraform init
        working-directory: infra/terraform
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${PROJECT_NAME}/production.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="dynamodb_table=${TF_LOCK_TABLE}" \
            -backend-config="encrypt=true"

      - name: Read Terraform outputs
        id: tf
        working-directory: infra/terraform
        run: |
          echo "ecr_repository_url=$(terraform output -raw ecr_repository_url)" >> "$GITHUB_OUTPUT"

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        working-directory: server
        env:
          ECR_REPOSITORY_URL: ${{ steps.tf.outputs.ecr_repository_url }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "${ECR_REPOSITORY_URL}:${IMAGE_TAG}" -t "${ECR_REPOSITORY_URL}:latest" .
          docker push "${ECR_REPOSITORY_URL}:${IMAGE_TAG}"
          docker push "${ECR_REPOSITORY_URL}:latest"

  deploy:
    if: github.event_name == 'push'
    needs: build_and_push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Bootstrap Terraform backend
        shell: bash
        run: |
          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          echo "ACCOUNT_ID=$ACCOUNT_ID" >> "$GITHUB_ENV"
          echo "TF_STATE_BUCKET=${PROJECT_NAME}-${ACCOUNT_ID}-${AWS_REGION}-tfstate" >> "$GITHUB_ENV"
          echo "TF_LOCK_TABLE=${PROJECT_NAME}-terraform-locks" >> "$GITHUB_ENV"

      - name: Terraform init
        working-directory: infra/terraform
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${PROJECT_NAME}/production.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="dynamodb_table=${TF_LOCK_TABLE}" \
            -backend-config="encrypt=true"

      - name: Sync runtime secrets to SSM Parameter Store
        env:
          APP_MONGO_URI: ${{ secrets.APP_MONGO_URI }}
          APP_JWT_SECRET: ${{ secrets.APP_JWT_SECRET }}
        run: |
          aws ssm put-parameter \
            --name "/${PROJECT_NAME}/production/mongo-uri" \
            --type SecureString \
            --value "$APP_MONGO_URI" \
            --overwrite

          aws ssm put-parameter \
            --name "/${PROJECT_NAME}/production/jwt-secret" \
            --type SecureString \
            --value "$APP_JWT_SECRET" \
            --overwrite

      - name: Read Terraform outputs
        id: tf
        working-directory: infra/terraform
        run: |
          {
            echo "ecr_repository_url=$(terraform output -raw ecr_repository_url)"
            echo "ecs_cluster_name=$(terraform output -raw ecs_cluster_name)"
            echo "ecs_service_name=$(terraform output -raw ecs_service_name)"
            echo "task_family=$(terraform output -raw task_family)"
            echo "execution_role_arn=$(terraform output -raw task_execution_role_arn)"
            echo "task_role_arn=$(terraform output -raw task_role_arn)"
            echo "cloudwatch_log_group_name=$(terraform output -raw cloudwatch_log_group_name)"
            echo "target_group_arn=$(terraform output -raw target_group_arn)"
            echo "public_subnet_ids_json=$(terraform output -raw public_subnet_ids_json)"
            echo "service_security_group_id=$(terraform output -raw service_security_group_id)"
            echo "load_balancer_dns_name=$(terraform output -raw load_balancer_dns_name)"
            echo "container_port=$(terraform output -raw container_port)"
          } >> "$GITHUB_OUTPUT"

      - name: Render ECS task definition
        env:
          IMAGE_URI: ${{ steps.tf.outputs.ecr_repository_url }}:${{ github.sha }}
          TASK_FAMILY: ${{ steps.tf.outputs.task_family }}
          EXECUTION_ROLE_ARN: ${{ steps.tf.outputs.execution_role_arn }}
          TASK_ROLE_ARN: ${{ steps.tf.outputs.task_role_arn }}
          CLOUDWATCH_LOG_GROUP_NAME: ${{ steps.tf.outputs.cloudwatch_log_group_name }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          CONTAINER_PORT: ${{ steps.tf.outputs.container_port }}
          PROJECT_NAME: ${{ env.PROJECT_NAME }}
        run: |
          jq -n \
            --arg family "$TASK_FAMILY" \
            --arg executionRoleArn "$EXECUTION_ROLE_ARN" \
            --arg taskRoleArn "$TASK_ROLE_ARN" \
            --arg image "$IMAGE_URI" \
            --arg logGroup "$CLOUDWATCH_LOG_GROUP_NAME" \
            --arg awsRegion "$AWS_REGION" \
            --arg projectName "$PROJECT_NAME" \
            --arg containerPort "$CONTAINER_PORT" \
            '{
              family: $family,
              networkMode: "awsvpc",
              requiresCompatibilities: ["FARGATE"],
              cpu: "256",
              memory: "512",
              executionRoleArn: $executionRoleArn,
              taskRoleArn: $taskRoleArn,
              containerDefinitions: [
                {
                  name: $projectName,
                  image: $image,
                  essential: true,
                  portMappings: [
                    {
                      containerPort: ($containerPort | tonumber),
                      hostPort: ($containerPort | tonumber),
                      protocol: "tcp"
                    }
                  ],
                  environment: [
                    { name: "NODE_ENV", value: "production" },
                    { name: "PORT", value: $containerPort },
                    { name: "CLIENT_URL", value: "http://localhost:3000" }
                  ],
                  secrets: [
                    { name: "MONGO_URI", valueFrom: "/" + $projectName + "/production/mongo-uri" },
                    { name: "JWT_SECRET", valueFrom: "/" + $projectName + "/production/jwt-secret" }
                  ],
                  logConfiguration: {
                    logDriver: "awslogs",
                    options: {
                      "awslogs-group": $logGroup,
                      "awslogs-region": $awsRegion,
                      "awslogs-stream-prefix": "ecs"
                    }
                  }
                }
              ]
            }' > task-definition.json

      - name: Register ECS task definition
        id: taskdef
        run: |
          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://task-definition.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          echo "task_definition_arn=$TASK_DEF_ARN" >> "$GITHUB_OUTPUT"

      - name: Create or update ECS service
        env:
          ECS_CLUSTER_NAME: ${{ steps.tf.outputs.ecs_cluster_name }}
          ECS_SERVICE_NAME: ${{ steps.tf.outputs.ecs_service_name }}
          TASK_DEFINITION_ARN: ${{ steps.taskdef.outputs.task_definition_arn }}
          TARGET_GROUP_ARN: ${{ steps.tf.outputs.target_group_arn }}
          PUBLIC_SUBNET_IDS_JSON: ${{ steps.tf.outputs.public_subnet_ids_json }}
          SERVICE_SECURITY_GROUP_ID: ${{ steps.tf.outputs.service_security_group_id }}
          CONTAINER_PORT: ${{ steps.tf.outputs.container_port }}
          PROJECT_NAME: ${{ env.PROJECT_NAME }}
        shell: bash
        run: |
          SUBNET_1="$(echo "$PUBLIC_SUBNET_IDS_JSON" | jq -r '.[0]')"
          SUBNET_2="$(echo "$PUBLIC_SUBNET_IDS_JSON" | jq -r '.[1]')"
          SERVICE_STATUS="$(aws ecs describe-services --cluster "$ECS_CLUSTER_NAME" --services "$ECS_SERVICE_NAME" --query 'services[0].status' --output text 2>/dev/null || true)"

          if [ "$SERVICE_STATUS" = "ACTIVE" ] || [ "$SERVICE_STATUS" = "DRAINING" ]; then
            aws ecs update-service \
              --cluster "$ECS_CLUSTER_NAME" \
              --service "$ECS_SERVICE_NAME" \
              --task-definition "$TASK_DEFINITION_ARN" \
              --force-new-deployment
          else
            aws ecs create-service \
              --cluster "$ECS_CLUSTER_NAME" \
              --service-name "$ECS_SERVICE_NAME" \
              --task-definition "$TASK_DEFINITION_ARN" \
              --desired-count 2 \
              --launch-type FARGATE \
              --enable-execute-command \
              --health-check-grace-period-seconds 60 \
              --network-configuration "awsvpcConfiguration={subnets=[$SUBNET_1,$SUBNET_2],securityGroups=[$SERVICE_SECURITY_GROUP_ID],assignPublicIp=ENABLED}" \
              --load-balancers "targetGroupArn=$TARGET_GROUP_ARN,containerName=$PROJECT_NAME,containerPort=$CONTAINER_PORT"
          fi

      - name: Wait for ECS service stability
        env:
          ECS_CLUSTER_NAME: ${{ steps.tf.outputs.ecs_cluster_name }}
          ECS_SERVICE_NAME: ${{ steps.tf.outputs.ecs_service_name }}
        run: aws ecs wait services-stable --cluster "$ECS_CLUSTER_NAME" --services "$ECS_SERVICE_NAME"

      - name: Verify service health endpoint
        env:
          LOAD_BALANCER_DNS_NAME: ${{ steps.tf.outputs.load_balancer_dns_name }}
        shell: bash
        run: |
          for _ in {1..20}; do
            if curl --fail --silent "http://${LOAD_BALANCER_DNS_NAME}/health"; then
              exit 0
            fi
            sleep 15
          done
          exit 1
