name: Full Stack CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test_and_build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # Backend
      - name: Install Backend Dependencies
        run: |
          cd server
          npm ci || npm install

      - name: Lint Backend
        run: |
          cd server
          npm run lint

      - name: Test Backend
        run: |
          cd server
          npm test

      - name: Build Backend
        run: |
          cd server
          npm run build

      # Frontend
      - name: Install Frontend Dependencies
        run: |
          cd client
          npm ci || npm install

      - name: Lint Frontend
        run: |
          cd client
          npm run lint

      - name: Test Frontend
        run: |
          cd client
          npm test

  deploy:
    runs-on: ubuntu-latest
    needs: test_and_build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            # Navigate to deployment workspace and run deploy script
            cd ~/projects/BhonuBaba
            chmod +x server/deploy.sh
            ./server/deploy.sh